<!DOCTYPE html>
<html>
<head>
	<title> Job Tracker  </title>
	<link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="navbar">

        <div class="nav-left">
            <h1>Job Application Tracker</h1>
        </div>

        <div class="nav-right">
            <a href="#" class="active">Overview</a>
            <a href="#">Job Applications</a>
            <a href="#">Settings</a>
            <button>Sign Out</button>
        </div>

    </header>
<!--This sections shows the summary of the app, like total jobs, wishlist, applications sent, notifications -->
<section class="summary-section">
	<div class="container summary-container">
		
		<div class="card">
			<h2>Total Jobs </h2>
			<p>5</p>
		</div>
		
		<div class="card">
			<h2>Wishlist </h2>
			<p>Jobs you want to apply for</p>
		</div>
		
		<div class="card">
			<h2>Applications Sent </h2>
			<p>2</p>
		</div>
		
		<div class="card">
			<h2>Notifications </h2>
			<p>Upcoming deadlines</p>
		</div>
	
	</div>
</section>
<!-- This sections will show the job applications in terms of the graphs(line graphs and pie chart -->
<section class="analytics-section">
	<div class="container analytics-container">
	
		<div class="card">
			<h2>Application Metrics </h2>
			<p>Line Graph will appear here </p>
		</div>
		
		<div class="card">
			<h2>Application Status </h2>
			<p>Pie chart will appear here </p>
		</div>
	</div>
</section>

</body>

</html>
